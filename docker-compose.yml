version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tramisu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tramisu
      POSTGRES_PASSWORD: tramisu_dev_password
      POSTGRES_DB: tramisu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tramisu"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
